<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#E31837"/>

  <!-- edges with arrowheads -->
  <defs>
    <marker id="arr" markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto">
      <path d="M0,0 L0,4 L4,2 Z" fill="rgba(255,255,255,0.85)"/>
    </marker>
  </defs>

  <line x1="12" y1="13" x2="19" y2="8.5" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="12" y1="19" x2="19" y2="23.5" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- source node -->
  <rect x="2" y="11" width="9" height="10" rx="2" fill="white"/>

  <!-- target nodes -->
  <rect x="21" y="3.5" width="9" height="8" rx="2" fill="white" opacity="0.95"/>
  <rect x="21" y="20.5" width="9" height="8" rx="2" fill="white" opacity="0.95"/>

  <!-- subtle inner lines to suggest text/content -->
  <line x1="4" y1="14.5" x2="9" y2="14.5" stroke="#E31837" stroke-width="1" opacity="0.35"/>
  <line x1="4" y1="17.5" x2="8"  y2="17.5" stroke="#E31837" stroke-width="1" opacity="0.35"/>
</svg>
