<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Carleton red background -->
  <rect width="32" height="32" rx="6" fill="#E31837"/>
  <!-- Connecting lines (drawn first, behind nodes) -->
  <line x1="11" y1="16" x2="21" y2="8"  stroke="white" stroke-width="1.5" stroke-opacity="0.65"/>
  <line x1="11" y1="16" x2="21" y2="24" stroke="white" stroke-width="1.5" stroke-opacity="0.65"/>
  <!-- Course nodes — same rounded-rect style as the map -->
  <rect x="2"  y="12" width="9" height="8" rx="1.5" fill="white"/>
  <rect x="21" y="4"  width="9" height="8" rx="1.5" fill="white"/>
  <rect x="21" y="20" width="9" height="8" rx="1.5" fill="white"/>
</svg>
